<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>生産実績 | 製造管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/nav.js"></script>
<div class="page">
  <div id="alert-zone" style="margin-bottom:1rem"></div>
  <div class="g4" style="margin-bottom:1rem">
    <div class="stat"><div class="sv" id="k0">—</div><div class="sl">本日 生産数</div></div>
    <div class="stat"><div class="sv" id="k1">—<span class="su">%</span></div><div class="sl">良品率</div></div>
    <div class="stat"><div class="sv" id="k2">—<span class="su">%</span></div><div class="sl">稼働率</div></div>
    <div class="stat"><div class="sv" id="k3">—<span class="su">%</span></div><div class="sl">OEE</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('input',this)">日次入力</button>
    <button class="tab" onclick="switchTab('chart',this);renderCharts()">グラフ分析</button>
    <button class="tab" onclick="switchTab('line',this)">ライン別集計</button>
    <button class="tab" onclick="switchTab('list',this);renderList()">実績一覧</button>
  </div>
  <div id="panel-input" class="panel show">
    <div class="card">
      <div class="sec">生産実績 入力</div>
      <div class="g3">
        <div class="f"><label>日付</label><input type="date" id="r-date"></div>
        <div class="f"><label>ライン名<span class="req">*</span></label><input type="text" id="r-line" placeholder="例：Aライン" list="ll"><datalist id="ll"></datalist></div>
        <div class="f"><label>設備名</label><input type="text" id="r-eq" placeholder="例：NC旋盤"></div>
      </div>
      <div class="g3">
        <div class="f"><label>計画生産数</label><input type="number" id="r-plan" placeholder="0" min="0" oninput="liveCalc()"></div>
        <div class="f"><label>実績生産数</label><input type="number" id="r-actual" placeholder="0" min="0" oninput="liveCalc()"></div>
        <div class="f"><label>良品数</label><input type="number" id="r-good" placeholder="0" min="0" oninput="liveCalc()"></div>
      </div>
      <div class="g3">
        <div class="f"><label>稼働時間（分）</label><input type="number" id="r-run" placeholder="0" min="0" oninput="liveCalc()"></div>
        <div class="f"><label>計画稼働時間（分）</label><input type="number" id="r-plantime" placeholder="480" min="0" oninput="liveCalc()"></div>
        <div class="f"><label>理想サイクルタイム（秒）</label><input type="number" id="r-ct" placeholder="0" min="0" step="0.1" oninput="liveCalc()"></div>
      </div>
      <div class="g2">
        <div class="f"><label>担当者</label><input type="text" id="r-person" placeholder="氏名"></div>
        <div class="f"><label>シフト</label><select id="r-shift"><option value="">—</option><option>日勤</option><option>夜勤</option><option>早番</option><option>遅番</option></select></div>
      </div>
      <div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div style="text-align:center"><div style="font-size:11px;color:var(--text2)">良品率</div><div style="font-size:18px;font-weight:500" id="cp-y">—</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--text2)">稼働率</div><div style="font-size:18px;font-weight:500" id="cp-a">—</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--text2)">OEE</div><div style="font-size:18px;font-weight:500" id="cp-o">—</div></div>
      </div>
      <div class="btn-row"><button class="btn btn-p" onclick="addRec()">実績登録</button><button class="btn" onclick="clearForm()">クリア</button></div>
      <div class="errmsg" id="r-err"></div>
    </div>
    <div class="card">
      <div class="sec">本日の実績</div>
      <div id="today-table"></div>
    </div>
  </div>
  <div id="panel-chart" class="panel">
    <div class="card">
      <div class="sec">推移グラフ</div>
      <div class="frow">
        <select id="ch-line" onchange="renderCharts()"><option value="">全ライン</option></select>
        <select id="ch-period" onchange="renderCharts()"><option value="7">直近7日</option><option value="30" selected>直近30日</option><option value="90">直近90日</option></select>
        <select id="ch-metric" onchange="renderCharts()"><option value="prod">生産数</option><option value="yield">良品率</option><option value="avail">稼働率</option><option value="oee">OEE</option></select>
      </div>
      <canvas id="main-chart" style="max-height:220px"></canvas>
    </div>
    <div class="g2">
      <div class="card"><div class="sec">OEE 構成要素</div><div id="oee-rings" style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;padding:8px 0"></div></div>
      <div class="card"><div class="sec">ライン別 平均OEE</div><div id="line-bars"></div></div>
    </div>
  </div>
  <div id="panel-line" class="panel">
    <div class="card">
      <div class="sec">ライン・設備別 集計</div>
      <div class="frow">
        <input type="date" id="ln-from"><span style="font-size:13px;color:var(--text2)">〜</span><input type="date" id="ln-to">
        <button class="btn btn-p" onclick="renderLineTable()">集計</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th style="width:100px">ライン/設備</th><th style="width:60px">日数</th><th style="width:80px">総生産数</th><th style="width:64px">計画比</th><th style="width:72px">良品率</th><th style="width:72px">稼働率</th><th style="width:64px">OEE</th><th style="width:80px">評価</th></tr></thead>
          <tbody id="line-tbody"></tbody>
        </table>
        <div id="line-empty" class="empty-hint">データがありません。</div>
      </div>
    </div>
  </div>
  <div id="panel-list" class="panel">
    <div class="card">
      <div class="sec">実績一覧</div>
      <div class="frow">
        <select id="ls-line" onchange="renderList()"><option value="">全ライン</option></select>
        <input type="date" id="ls-from"><span style="font-size:13px;color:var(--text2)">〜</span><input type="date" id="ls-to">
        <button class="btn" onclick="renderList()">絞り込み</button>
        <button class="btn" onclick="exportCSV()">CSV出力 ↓</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th style="width:80px">日付</th><th style="width:80px">ライン</th><th style="width:72px">設備</th><th style="width:52px">計画</th><th style="width:52px">実績</th><th style="width:56px">良品率</th><th style="width:56px">稼働率</th><th style="width:52px">OEE</th><th style="width:44px">削除</th></tr></thead>
          <tbody id="list-tbody"></tbody>
        </table>
        <div id="list-empty" class="empty-hint">データがありません。</div>
      </div>
    </div>
  </div>
</div>
<script src="js/shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let recs=loadKey('prod_recs')||[]; let mc=null;
document.getElementById('r-date').value=tod(); document.getElementById('r-plantime').value='480';
document.getElementById('ln-from').value=dAgo(29); document.getElementById('ln-to').value=tod();
document.getElementById('ls-from').value=dAgo(29); document.getElementById('ls-to').value=tod();

function calcOEE(r){
  const a=r.actual||0,g=r.good||0,run=r.run||0,pt=r.plantime||480,ct=r.ct||0;
  const y=a>0?Math.min(100,(g/a)*100):0;
  const av=pt>0?Math.min(100,(run/pt)*100):0;
  const pf=(run>0&&ct>0)?Math.min(100,((a*(ct/60))/run)*100):(a>0&&r.plan>0?Math.min(100,(a/r.plan)*100):0);
  const o=(av/100)*(pf/100)*(y/100)*100;
  return{yieldRate:Math.round(y*10)/10,avail:Math.round(av*10)/10,perf:Math.round(pf*10)/10,oee:Math.round(o*10)/10};
}
function liveCalc(){
  const c=calcOEE({actual:parseFloat(document.getElementById('r-actual').value)||0,good:parseFloat(document.getElementById('r-good').value)||0,run:parseFloat(document.getElementById('r-run').value)||0,plantime:parseFloat(document.getElementById('r-plantime').value)||480,ct:parseFloat(document.getElementById('r-ct').value)||0,plan:parseFloat(document.getElementById('r-plan').value)||0});
  const a=parseFloat(document.getElementById('r-actual').value)||0,r2=parseFloat(document.getElementById('r-run').value)||0;
  document.getElementById('cp-y').textContent=a>0?c.yieldRate+'%':'—';
  document.getElementById('cp-a').textContent=r2>0?c.avail+'%':'—';
  document.getElementById('cp-o').textContent=c.oee>0?c.oee+'%':'—';
}
function addRec(){
  const date=document.getElementById('r-date').value,line=document.getElementById('r-line').value.trim();
  if(!date||!line){document.getElementById('r-err').textContent='日付・ライン名は必須です。';return;}
  document.getElementById('r-err').textContent='';
  const r={id:Date.now(),date,line,eq:document.getElementById('r-eq').value.trim(),plan:parseInt(document.getElementById('r-plan').value)||0,actual:parseInt(document.getElementById('r-actual').value)||0,good:parseInt(document.getElementById('r-good').value)||0,run:parseInt(document.getElementById('r-run').value)||0,plantime:parseInt(document.getElementById('r-plantime').value)||480,ct:parseFloat(document.getElementById('r-ct').value)||0,person:document.getElementById('r-person').value.trim(),shift:document.getElementById('r-shift').value,createdAt:new Date().toLocaleString('ja-JP')};
  const c=calcOEE(r);r.yieldRate=c.yieldRate;r.avail=c.avail;r.perf=c.perf;r.oee=c.oee;
  recs.unshift(r);saveKey('prod_recs',recs);updateAll();clearForm();
}
function clearForm(){['r-line','r-eq','r-plan','r-actual','r-good','r-run','r-person'].forEach(id=>document.getElementById(id).value='');document.getElementById('r-date').value=tod();document.getElementById('r-plantime').value='480';document.getElementById('r-ct').value='';document.getElementById('r-shift').value='';document.getElementById('r-err').textContent='';document.getElementById('cp-y').textContent='—';document.getElementById('cp-a').textContent='—';document.getElementById('cp-o').textContent='—';}
function updateKPI(){
  const t=recs.filter(r=>r.date===tod());
  const avg=fn=>t.length?Math.round(t.reduce((a,r)=>a+fn(r),0)/t.length*10)/10:null;
  document.getElementById('k0').textContent=t.length?t.reduce((a,r)=>a+r.actual,0).toLocaleString():'—';
  document.getElementById('k1').innerHTML=(avg(r=>r.yieldRate)??'—')+'<span class="su">%</span>';
  document.getElementById('k2').innerHTML=(avg(r=>r.avail)??'—')+'<span class="su">%</span>';
  document.getElementById('k3').innerHTML=(avg(r=>r.oee)??'—')+'<span class="su">%</span>';
}
function updateAlerts(){
  const t=recs.filter(r=>r.date===tod());
  const ly=t.filter(r=>r.yieldRate>0&&r.yieldRate<90),lo=t.filter(r=>r.oee>0&&r.oee<65);
  let h='';
  if(ly.length)h+=`<div class="alert danger"><span class="alert-icon">!</span><strong>良品率90%未満：</strong>${ly.map(r=>r.line+' '+r.yieldRate+'%').join('、')}</div>`;
  if(lo.length)h+=`<div class="alert warn"><span class="alert-icon">!</span><strong>OEE65%未満：</strong>${lo.map(r=>r.line+' '+r.oee+'%').join('、')}</div>`;
  document.getElementById('alert-zone').innerHTML=h;
}
function updateTodayTable(){
  const t=recs.filter(r=>r.date===tod());
  document.getElementById('today-table').innerHTML=t.length
    ?`<div class="tbl-wrap"><table><thead><tr><th>ライン</th><th style="width:52px">計画</th><th style="width:52px">実績</th><th style="width:60px">良品率</th><th style="width:56px">稼働率</th><th style="width:52px">OEE</th></tr></thead><tbody>${t.map(r=>`<tr><td style="font-size:11px">${r.line}</td><td style="text-align:right">${r.plan||'—'}</td><td style="text-align:right;font-weight:500">${r.actual}</td><td><span class="badge ${r.yieldRate>=95?'b-grn':r.yieldRate>=90?'b-amb':'b-red'}">${r.yieldRate}%</span></td><td><span class="badge ${r.avail>=90?'b-grn':r.avail>=80?'b-amb':'b-red'}">${r.avail}%</span></td><td><span class="badge ${r.oee>=75?'b-grn':r.oee>=65?'b-amb':'b-red'}">${r.oee}%</span></td></tr>`).join('')}</tbody></table></div>`
    :'<div class="empty-hint">本日のデータがありません。上から入力してください。</div>';
}
function updateLineFilter(){
  const lines=[...new Set(recs.map(r=>r.line).filter(Boolean))];
  ['ch-line','ls-line'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const c=el.value;el.innerHTML='<option value="">全ライン</option>';lines.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;el.appendChild(o);});el.value=c;});
  const dl=document.getElementById('ll');if(dl){dl.innerHTML='';lines.forEach(l=>{const o=document.createElement('option');o.value=l;dl.appendChild(o);});}
}
function renderCharts(){
  const line=document.getElementById('ch-line').value,days=parseInt(document.getElementById('ch-period').value)||30,metric=document.getElementById('ch-metric').value;
  const from=dAgo(days-1);let filtered=recs.filter(r=>r.date>=from);if(line)filtered=filtered.filter(r=>r.line===line);
  const dateMap={};filtered.forEach(r=>{if(!dateMap[r.date])dateMap[r.date]={prod:0,plan:0,yield:[],avail:[],oee:[]};dateMap[r.date].prod+=r.actual;dateMap[r.date].plan+=r.plan;dateMap[r.date].yield.push(r.yieldRate);dateMap[r.date].avail.push(r.avail);dateMap[r.date].oee.push(r.oee);});
  const labels=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);labels.push(d.toISOString().slice(0,10));}
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10:null;
  let datasets=[];
  const COLORS={prod:'#378ADD',yield:'#1D9E75',avail:'#BA7517',oee:'#7F77DD'};
  if(metric==='prod'){datasets=[{label:'実績',data:labels.map(d=>dateMap[d]?.prod||0),backgroundColor:'#378ADD33',borderColor:'#378ADD',borderWidth:1.5,fill:true,tension:.3,pointRadius:3},{label:'計画',data:labels.map(d=>dateMap[d]?.plan||0),borderColor:'#B4B2A9',borderWidth:1,fill:false,tension:.3,pointRadius:2}];}
  else{const col=COLORS[metric];datasets=[{label:{yield:'良品率',avail:'稼働率',oee:'OEE'}[metric]+' (%)',data:labels.map(d=>avg(dateMap[d]?.[metric]||[])),borderColor:col,backgroundColor:col+'22',borderWidth:1.5,fill:true,tension:.3,pointRadius:3}];}
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches,gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.05)',tc=isDark?'#a8a69e':'#73726c';
  const ctx=document.getElementById('main-chart');if(mc)mc.destroy();
  mc=new Chart(ctx,{type:'line',data:{labels:labels.map(d=>d.slice(5)),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:10}}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},beginAtZero:true}}}});
  const af=recs.filter(r=>r.date>=from&&(line?r.line===line:true));
  const avf=fn=>af.length?Math.round(af.reduce((a,r)=>a+fn(r),0)/af.length*10)/10:0;
  const items=[{lbl:'可用性',val:avf(r=>r.avail),col:'#BA7517'},{lbl:'性能率',val:avf(r=>r.perf||0),col:'#185FA5'},{lbl:'良品率',val:avf(r=>r.yieldRate),col:'#1D9E75'},{lbl:'OEE',val:avf(r=>r.oee),col:'#7F77DD'}];
  document.getElementById('oee-rings').innerHTML=items.map(it=>`<div style="text-align:center"><svg viewBox="0 0 52 52" width="64" height="64"><circle cx="26" cy="26" r="20" fill="none" stroke="var(--border)" stroke-width="5"/><circle cx="26" cy="26" r="20" fill="none" stroke="${it.col}" stroke-width="5" stroke-dasharray="${Math.round(it.val*1.257)} 125.7" stroke-dashoffset="31.4" stroke-linecap="round"/><text x="26" y="30" text-anchor="middle" font-size="10" font-weight="500" fill="${it.col}">${it.val}%</text></svg><div style="font-size:10px;color:var(--text2)">${it.lbl}</div></div>`).join('');
  const lines=[...new Set(recs.map(r=>r.line))];
  document.getElementById('line-bars').innerHTML=lines.map(l=>{const lr=recs.filter(r=>r.date>=from&&r.line===l);const lo=lr.length?Math.round(lr.reduce((a,r)=>a+r.oee,0)/lr.length*10)/10:0;const col=lo>=75?'#1D9E75':lo>=65?'#BA7517':'#E24B4A';return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${l}</span><span style="font-weight:500;color:${col}">${lo}%</span></div><div class="prog-wrap"><div class="prog-fill" style="width:${lo}%;background:${col}"></div></div></div>`;}).join('')||'<div class="empty-hint">データがありません</div>';
}
function renderLineTable(){
  const from=document.getElementById('ln-from').value,to=document.getElementById('ln-to').value;
  const filtered=recs.filter(r=>(!from||r.date>=from)&&(!to||r.date<=to));
  const groups={};filtered.forEach(r=>{const k=r.line+(r.eq?' / '+r.eq:'');if(!groups[k])groups[k]={line:r.line,eq:r.eq,days:new Set(),prod:0,plan:0,y:[],a:[],o:[]};groups[k].days.add(r.date);groups[k].prod+=r.actual;groups[k].plan+=r.plan;groups[k].y.push(r.yieldRate);groups[k].a.push(r.avail);groups[k].o.push(r.oee);});
  const rows=Object.entries(groups).map(([k,g])=>({key:k,line:g.line,eq:g.eq,days:g.days.size,prod:g.prod,plan:g.plan,yld:Math.round(g.y.reduce((a,b)=>a+b,0)/g.y.length*10)/10,avail:Math.round(g.a.reduce((a,b)=>a+b,0)/g.a.length*10)/10,oee:Math.round(g.o.reduce((a,b)=>a+b,0)/g.o.length*10)/10})).sort((a,b)=>b.oee-a.oee);
  document.getElementById('line-empty').style.display=rows.length?'none':'block';
  document.getElementById('line-tbody').innerHTML=rows.map(r=>{const ratio=r.plan>0?Math.round(r.prod/r.plan*100):null;return `<tr><td><div style="font-size:12px;font-weight:500">${r.line}</div>${r.eq?`<div style="font-size:11px;color:var(--text2)">${r.eq}</div>`:''}</td><td style="text-align:right">${r.days}</td><td style="text-align:right">${r.prod.toLocaleString()}</td><td style="text-align:right">${ratio!==null?ratio+'%':'—'}</td><td><span class="badge ${r.yld>=95?'b-grn':r.yld>=90?'b-amb':'b-red'}">${r.yld}%</span></td><td><span class="badge ${r.avail>=90?'b-grn':r.avail>=80?'b-amb':'b-red'}">${r.avail}%</span></td><td><span class="badge ${r.oee>=75?'b-grn':r.oee>=65?'b-amb':'b-red'}">${r.oee}%</span></td><td><span class="badge ${r.oee>=75?'b-grn':r.oee>=65?'b-amb':'b-red'}">${r.oee>=75?'優良':r.oee>=65?'要改善':'要対応'}</span></td></tr>`;}).join('');
}
function renderList(){
  const fl=document.getElementById('ls-line').value,from=document.getElementById('ls-from').value,to=document.getElementById('ls-to').value;
  const filtered=recs.filter(r=>(!fl||r.line===fl)&&(!from||r.date>=from)&&(!to||r.date<=to));
  document.getElementById('list-empty').style.display=filtered.length?'none':'block';
  document.getElementById('list-tbody').innerHTML=filtered.map(r=>`<tr><td>${r.date}</td><td style="font-size:11px">${r.line}</td><td style="font-size:11px">${r.eq||'—'}</td><td style="text-align:right">${r.plan||'—'}</td><td style="text-align:right;font-weight:500">${r.actual}</td><td><span class="badge ${r.yieldRate>=95?'b-grn':r.yieldRate>=90?'b-amb':'b-red'}">${r.yieldRate}%</span></td><td><span class="badge ${r.avail>=90?'b-grn':r.avail>=80?'b-amb':'b-red'}">${r.avail}%</span></td><td><span class="badge ${r.oee>=75?'b-grn':r.oee>=65?'b-amb':'b-red'}">${r.oee}%</span></td><td><button class="btn btn-d" style="font-size:11px;padding:2px 8px" onclick="delRec(${r.id})">削除</button></td></tr>`).join('');
}
function delRec(id){if(!confirm('削除しますか？'))return;recs=recs.filter(r=>r.id!==id);saveKey('prod_recs',recs);updateAll();renderList();}
function exportCSV(){if(!recs.length){alert('データがありません');return;}const h=['日付','ライン','設備','計画数','実績数','良品数','良品率(%)','稼働時間(分)','計画時間(分)','CT(秒)','稼働率(%)','性能率(%)','OEE(%)','シフト','担当者'];const rows=recs.map(r=>[r.date,r.line,r.eq,r.plan,r.actual,r.good,r.yieldRate,r.run,r.plantime,r.ct,r.avail,r.perf,r.oee,r.shift,r.person].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8'}));a.download=`生産実績_${tod()}.csv`;a.click();}
function updateAll(){updateKPI();updateAlerts();updateTodayTable();updateLineFilter();}
updateAll();
</script>
</body>
</html>
