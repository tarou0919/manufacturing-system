<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>製造統合管理システム</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/nav.js"></script>

<div class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:16px;font-weight:500">製造統合管理システム</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">品質 / 設備 / 生産実績 / 受注スケジュール</div>
    </div>
    <div style="font-size:12px;color:var(--text2)" id="clock"></div>
  </div>

  <div id="alert-zone"></div>

  <div class="g4" id="kpi-grid">
    <div class="stat"><div class="sv" id="k0">—</div><div class="sl">本日 生産数</div><div style="font-size:11px;margin-top:2px" id="kd0"></div></div>
    <div class="stat"><div class="sv" id="k1">—<span class="su">%</span></div><div class="sl">本日 OEE</div><div style="font-size:11px;margin-top:2px" id="kd1"></div></div>
    <div class="stat"><div class="sv" id="k2">—</div><div class="sl">未処置 不良</div></div>
    <div class="stat"><div class="sv" id="k3">—</div><div class="sl">納期3日以内</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem" id="module-grid">
    <!-- ① QC -->
    <div class="card">
      <div class="sec">① 品質・不良管理 <a href="quality.html" style="font-size:11px;color:var(--info)">開く →</a></div>
      <div style="display:flex;gap:8px;margin-bottom:10px" id="qc-stats"></div>
      <div id="qc-list"></div>
    </div>
    <!-- ② EQ -->
    <div class="card">
      <div class="sec">② 設備保全 <a href="equipment.html" style="font-size:11px;color:var(--info)">開く →</a></div>
      <div style="display:flex;gap:8px;margin-bottom:10px" id="eq-stats"></div>
      <div id="eq-list"></div>
    </div>
    <!-- ③ Prod -->
    <div class="card">
      <div class="sec">③ 生産実績 <a href="production.html" style="font-size:11px;color:var(--info)">開く →</a></div>
      <div style="display:flex;gap:8px;margin-bottom:10px" id="prod-stats"></div>
      <div id="prod-list"></div>
    </div>
    <!-- ④ SD -->
    <div class="card">
      <div class="sec">④ スケジュール <a href="schedule.html" style="font-size:11px;color:var(--info)">開く →</a></div>
      <div style="display:flex;gap:8px;margin-bottom:10px" id="sd-stats"></div>
      <div id="sd-list"></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem">
    <div class="card">
      <div class="sec">直近7日 生産推移</div>
      <canvas id="trend-chart" style="max-height:160px"></canvas>
      <div id="trend-empty" class="empty-hint" style="display:none">生産実績データがありません</div>
    </div>
    <div class="card">
      <div class="sec">OEE 構成要素（直近30日）</div>
      <div id="oee-rings" style="display:flex;justify-content:space-around;padding:8px 0;flex-wrap:wrap;gap:8px"></div>
      <div id="oee-empty" class="empty-hint" style="display:none">生産実績データがありません</div>
    </div>
  </div>

  <div class="card">
    <div class="sec">本日のアクション一覧</div>
    <div id="action-list"></div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let trendChart = null;

function clock() {
  const n = new Date();
  const w = ['日','月','火','水','木','金','土'];
  document.getElementById('clock').textContent =
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}（${w[n.getDay()]}） ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
clock(); setInterval(clock, 30000);

function chip(val, lbl, color) {
  return `<div style="background:var(--bg2);border-radius:var(--radius);padding:8px 12px;text-align:center;flex:1;min-width:56px">
    <div style="font-size:18px;font-weight:500;color:${color||'var(--text)'}">${val}</div>
    <div style="font-size:10px;color:var(--text2);margin-top:2px">${lbl}</div>
  </div>`;
}

function cst(o) {
  if (o.status === '完了') return '完了';
  if (dd(o.due) < 0) return '納期超過';
  if (o.steps && o.steps.some(s => s.status === '進行中' || s.status === '完了')) return '進行中';
  return '未着手';
}
function cprog(o) {
  if (!o.steps || !o.steps.length) return o.progress || 0;
  return Math.round(o.steps.filter(s => s.status === '完了').length / o.steps.length * 100);
}

function init() {
  const qc    = loadKey('qc_recs')    || [];
  const eqs   = loadKey('eq2_eqs')   || [];
  const hists = loadKey('eq2_hists') || [];
  const prods = loadKey('prod_recs') || [];
  const orders = loadKey('sd_orders') || [];

  // ── KPI ──
  const todProd = prods.filter(r => r.date === tod());
  const yestProd = prods.filter(r => r.date === dAgo(1));
  const sumP = todProd.reduce((a,r) => a + r.actual, 0);
  const avgOEE = todProd.length ? Math.round(todProd.reduce((a,r) => a + r.oee, 0) / todProd.length * 10) / 10 : null;
  const openQC = qc.filter(r => r.status === '未処置').length;
  const soonOrd = orders.filter(o => { const d = dd(o.due); return d >= 0 && d <= 3 && cst(o) !== '完了'; }).length;

  document.getElementById('k0').textContent = todProd.length ? sumP.toLocaleString() : '—';
  document.getElementById('k1').innerHTML = avgOEE !== null ? avgOEE + '<span class="su">%</span>' : '—';
  document.getElementById('k2').textContent = openQC;
  document.getElementById('k2').style.color = openQC > 0 ? 'var(--danger)' : 'var(--success)';
  document.getElementById('k3').textContent = soonOrd;
  document.getElementById('k3').style.color = soonOrd > 0 ? 'var(--warn)' : 'var(--success)';

  const diff = (cur, prev) => {
    if (prev === null || cur === null) return '';
    const d = Math.round((cur - prev) * 10) / 10;
    if (d > 0) return `<span style="color:var(--success)">前日比 +${d}</span>`;
    if (d < 0) return `<span style="color:var(--danger)">前日比 ${d}</span>`;
    return `<span style="color:var(--text2)">前日比 ±0</span>`;
  };
  if (yestProd.length) {
    document.getElementById('kd0').innerHTML = diff(sumP, yestProd.reduce((a,r) => a + r.actual, 0));
    document.getElementById('kd1').innerHTML = diff(avgOEE, Math.round(yestProd.reduce((a,r) => a + r.oee, 0) / yestProd.length * 10) / 10);
  }

  // ── Alerts ──
  const alerts = [];
  eqs.filter(e => e.nextInspection && dd(e.nextInspection) < 0).forEach(e =>
    alerts.push({ type:'danger', msg:`【設備超過】${e.name}（${e.line}）点検期限 ${Math.abs(dd(e.nextInspection))}日超過` }));
  orders.filter(o => cst(o) === '納期超過').forEach(o =>
    alerts.push({ type:'danger', msg:`【受注超過】${o.no} ${o.client} 納期超過` }));
  eqs.filter(e => e.nextInspection && dd(e.nextInspection) >= 0 && dd(e.nextInspection) <= 7).forEach(e =>
    alerts.push({ type:'warn', msg:`【設備間近】${e.name} 点検まで残り ${dd(e.nextInspection)}日` }));
  orders.filter(o => { const d = dd(o.due); return d >= 0 && d <= 3 && cst(o) !== '完了'; }).forEach(o =>
    alerts.push({ type:'warn', msg:`【納期間近】${o.no} ${o.client} 残り ${dd(o.due)}日` }));
  if (openQC > 0) alerts.push({ type:'warn', msg:`未処置の不良記録が ${openQC}件 あります` });

  const az = document.getElementById('alert-zone');
  az.innerHTML = alerts.length
    ? alerts.map(a => `<div class="alert ${a.type}"><span class="alert-icon">!</span><span>${a.msg}</span></div>`).join('')
    : `<div class="alert success"><span class="alert-icon">✓</span><span>現在、緊急のアラートはありません</span></div>`;

  // ── ① QC ──
  const openN = qc.filter(r => r.status === '未処置').length;
  const progN = qc.filter(r => r.status === '対応中').length;
  const doneN = qc.filter(r => r.status === '処置済').length;
  document.getElementById('qc-stats').innerHTML =
    chip(openN,'未処置','var(--danger)') + chip(progN,'対応中','var(--warn)') + chip(doneN,'処置済','var(--success)');
  const recent = qc.filter(r => r.status !== '処置済').slice(0, 3);
  document.getElementById('qc-list').innerHTML = recent.length
    ? `<table><thead><tr><th style="width:72px">日付</th><th>工程</th><th style="width:80px">種別</th><th style="width:64px">状態</th></tr></thead><tbody>
        ${recent.map(r => `<tr><td>${r.date}</td><td style="font-size:11px">${r.process}</td>
          <td><span class="badge b-blu" style="font-size:10px">${r.type}</span></td>
          <td><span class="badge ${r.status==='未処置'?'b-red':'b-amb'}" style="font-size:10px">${r.status}</span></td></tr>`).join('')}
      </tbody></table>`
    : '<div class="empty-hint">未処置の不良記録はありません</div>';

  // ── ② EQ ──
  const overN = eqs.filter(e => e.nextInspection && dd(e.nextInspection) < 0).length;
  const nearN = eqs.filter(e => e.nextInspection && dd(e.nextInspection) >= 0 && dd(e.nextInspection) <= 7).length;
  const okN = eqs.length - overN - nearN;
  document.getElementById('eq-stats').innerHTML =
    chip(overN,'超過中','var(--danger)') + chip(nearN,'期限間近','var(--warn)') + chip(okN,'正常','var(--success)');
  const urgEQ = [...eqs.filter(e => e.nextInspection && dd(e.nextInspection) < 0),
                 ...eqs.filter(e => e.nextInspection && dd(e.nextInspection) >= 0 && dd(e.nextInspection) <= 7)].slice(0, 3);
  document.getElementById('eq-list').innerHTML = urgEQ.length
    ? `<table><thead><tr><th>設備名</th><th style="width:64px">ライン</th><th style="width:88px">次回点検日</th><th style="width:72px">状態</th></tr></thead><tbody>
        ${urgEQ.map(e => { const d = dd(e.nextInspection); return `<tr>
          <td style="font-size:12px;font-weight:500">${e.name}</td><td style="font-size:11px">${e.line}</td><td>${e.nextInspection}</td>
          <td><span class="badge ${d<0?'b-red':'b-amb'}" style="font-size:10px">${d<0?'超過'+Math.abs(d)+'日':'残り'+d+'日'}</span></td></tr>`; }).join('')}
      </tbody></table>`
    : '<div class="empty-hint">期限が迫っている設備はありません</div>';

  // ── ③ Prod ──
  const r7 = prods.filter(r => r.date >= dAgo(6));
  const avg = fn => r7.length ? Math.round(r7.reduce((a,r) => a + fn(r), 0) / r7.length * 10) / 10 : 0;
  document.getElementById('prod-stats').innerHTML =
    chip(avg(r => r.yieldRate) + '%','平均良品率') +
    chip(avg(r => r.avail) + '%','平均稼働率') +
    chip(avg(r => r.oee) + '%','平均OEE', avg(r=>r.oee) >= 75 ? 'var(--success)' : avg(r=>r.oee) >= 65 ? 'var(--warn)' : 'var(--danger)');
  const todayProd = prods.filter(r => r.date === tod());
  document.getElementById('prod-list').innerHTML = todayProd.length
    ? `<table><thead><tr><th>ライン</th><th style="width:48px">実績</th><th style="width:64px">良品率</th><th style="width:52px">OEE</th></tr></thead><tbody>
        ${todayProd.slice(0,4).map(r => `<tr>
          <td style="font-size:11px">${r.line}</td><td style="text-align:right">${r.actual}</td>
          <td><span class="badge ${r.yieldRate>=95?'b-grn':r.yieldRate>=90?'b-amb':'b-red'}" style="font-size:10px">${r.yieldRate}%</span></td>
          <td><span class="badge ${r.oee>=75?'b-grn':r.oee>=65?'b-amb':'b-red'}" style="font-size:10px">${r.oee}%</span></td></tr>`).join('')}
      </tbody></table>`
    : '<div class="empty-hint">本日のデータがありません</div>';

  // ── ④ Schedule ──
  const inprogN = orders.filter(o => cst(o) === '進行中').length;
  const overON = orders.filter(o => cst(o) === '納期超過').length;
  const doneON = orders.filter(o => cst(o) === '完了').length;
  document.getElementById('sd-stats').innerHTML =
    chip(inprogN,'進行中','var(--info)') + chip(overON,'超過','var(--danger)') + chip(doneON,'完了','var(--success)');
  const PCOL = {緊急:'b-red',高:'b-amb',通常:'b-blu',低:'b-gray'};
  const urgOrd = orders.filter(o => cst(o) !== '完了')
    .sort((a,b) => ({緊急:0,高:1,通常:2,低:3}[a.priority]||2) - ({緊急:0,高:1,通常:2,低:3}[b.priority]||2) || a.due.localeCompare(b.due))
    .slice(0, 4);
  document.getElementById('sd-list').innerHTML = urgOrd.length
    ? `<table><thead><tr><th style="width:96px">受注番号</th><th>顧客</th><th style="width:72px">納期</th><th style="width:68px">進捗</th></tr></thead><tbody>
        ${urgOrd.map(o => { const d = dd(o.due); const prog = cprog(o); return `<tr>
          <td><span class="badge ${PCOL[o.priority]||'b-gray'}" style="font-size:10px">${o.no}</span></td>
          <td style="font-size:11px">${o.client}</td>
          <td style="color:${d<0?'var(--danger)':d<=3?'var(--warn)':'var(--text)'};font-size:11px">${d<0?'超過'+Math.abs(d)+'日':'残り'+d+'日'}</td>
          <td><div style="display:flex;align-items:center;gap:4px">
            <div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${prog}%;background:${prog===100?'#1D9E75':'#378ADD'}"></div></div>
            <span style="font-size:10px;min-width:24px;text-align:right">${prog}%</span>
          </div></td></tr>`; }).join('')}
      </tbody></table>`
    : '<div class="empty-hint">進行中の受注はありません</div>';

  // ── Trend Chart ──
  const labels = [], prodD = [], oeeD = [];
  for (let i = 6; i >= 0; i--) {
    const d = dAgo(i); const dt = new Date(d);
    labels.push(`${dt.getMonth()+1}/${dt.getDate()}`);
    const dr = prods.filter(r => r.date === d);
    prodD.push(dr.reduce((a,r) => a + r.actual, 0) || null);
    oeeD.push(dr.length ? Math.round(dr.reduce((a,r) => a + r.oee, 0) / dr.length * 10) / 10 : null);
  }
  const hasData = prodD.some(v => v !== null);
  document.getElementById('trend-empty').style.display = hasData ? 'none' : 'block';
  if (hasData) {
    const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
    const gc = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
    const tc = isDark ? '#a8a69e' : '#73726c';
    const ctx = document.getElementById('trend-chart');
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [
        { label:'生産数', data: prodD, backgroundColor:'#378ADD33', borderColor:'#378ADD', borderWidth:1.5, borderRadius:3, yAxisID:'y' },
        { label:'OEE%', data: oeeD, type:'line', borderColor:'#7F77DD', borderWidth:1.5, pointRadius:3, fill:false, tension:.3, yAxisID:'y2' }
      ]},
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:tc, font:{size:11}, boxWidth:10 }}},
        scales: { x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}, y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},beginAtZero:true}, y2:{position:'right',ticks:{color:'#7F77DD',font:{size:10}},grid:{display:false},min:0,max:100} }}
    });
  }

  // ── OEE Rings ──
  const r30 = prods.filter(r => r.date >= dAgo(29));
  const avg30 = fn => r30.length ? Math.round(r30.reduce((a,r) => a + fn(r), 0) / r30.length * 10) / 10 : 0;
  const items = [
    {lbl:'可用性',val:avg30(r=>r.avail),col:'#BA7517'},
    {lbl:'性能率',val:avg30(r=>r.perf||0),col:'#185FA5'},
    {lbl:'良品率',val:avg30(r=>r.yieldRate),col:'#1D9E75'},
    {lbl:'OEE',val:avg30(r=>r.oee),col:'#7F77DD'}
  ];
  const hasOEE = r30.length > 0;
  document.getElementById('oee-empty').style.display = hasOEE ? 'none' : 'block';
  document.getElementById('oee-rings').style.display = hasOEE ? 'flex' : 'none';
  if (hasOEE) {
    document.getElementById('oee-rings').innerHTML = items.map(it => `<div style="text-align:center">
      <svg viewBox="0 0 52 52" width="64" height="64">
        <circle cx="26" cy="26" r="20" fill="none" stroke="var(--border)" stroke-width="5"/>
        <circle cx="26" cy="26" r="20" fill="none" stroke="${it.col}" stroke-width="5"
          stroke-dasharray="${Math.round(it.val*1.257)} 125.7" stroke-dashoffset="31.4" stroke-linecap="round"/>
        <text x="26" y="30" text-anchor="middle" font-size="10" font-weight="500" fill="${it.col}">${it.val}%</text>
      </svg>
      <div style="font-size:10px;color:var(--text2)">${it.lbl}</div>
    </div>`).join('');
  }

  // ── Actions ──
  const actions = [];
  eqs.filter(e => e.nextInspection && dd(e.nextInspection) < 0).forEach(e =>
    actions.push({p:0,tag:'設備',cls:'b-red',msg:`${e.name}（${e.line}）の点検期限が${Math.abs(dd(e.nextInspection))}日超過しています`}));
  orders.filter(o => cst(o) === '納期超過').forEach(o =>
    actions.push({p:0,tag:'受注',cls:'b-red',msg:`${o.no} ${o.client} の納期が超過しています`}));
  qc.filter(r => r.status === '未処置').slice(0,3).forEach(r =>
    actions.push({p:1,tag:'品質',cls:'b-amb',msg:`${r.date} ${r.process} の${r.type}が未処置です`}));
  eqs.filter(e => e.nextInspection && dd(e.nextInspection) >= 0 && dd(e.nextInspection) <= 7).forEach(e =>
    actions.push({p:1,tag:'設備',cls:'b-amb',msg:`${e.name}（${e.line}）の点検まで残り${dd(e.nextInspection)}日です`}));
  orders.filter(o => { const d = dd(o.due); return d >= 0 && d <= 3 && cst(o) !== '完了'; }).forEach(o =>
    actions.push({p:1,tag:'受注',cls:'b-amb',msg:`${o.no} ${o.client} の納期まで残り${dd(o.due)}日です`}));
  const al = document.getElementById('action-list');
  al.innerHTML = actions.length
    ? actions.sort((a,b) => a.p-b.p).map(a =>
        `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)">
          <span class="badge ${a.cls}" style="flex-shrink:0;margin-top:1px">${a.tag}</span>
          <span style="font-size:12px">${a.msg}</span>
        </div>`).join('') +
        '<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:right">各モジュールで対応すると自動で消えます</div>'
    : '<div class="empty-hint">本日のアクション項目はありません</div>';
}

init();
setInterval(init, 60000);
</script>
</body>
</html>
